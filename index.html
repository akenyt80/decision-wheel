<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>决策转盘</title>
  <style>
    :root {
      --bg: #fff7f4;
      --bg-soft: #fffdfb;
      --card: rgba(255, 255, 255, 0.82);
      --text: #2f2a35;
      --muted: #827889;
      --primary: #ff6f91;
      --primary-dark: #ef4e75;
      --secondary: #7c73ff;
      --danger: #ff5d5d;
      --line: rgba(109, 91, 117, 0.16);
      --shadow: 0 18px 55px rgba(91, 62, 84, 0.14);
      --shadow-soft: 0 10px 28px rgba(91, 62, 84, 0.1);
      --radius-xl: 30px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 15% 12%, rgba(255, 190, 152, 0.34), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(170, 218, 255, 0.42), transparent 30%),
        radial-gradient(circle at 54% 92%, rgba(199, 179, 255, 0.32), transparent 34%),
        linear-gradient(135deg, #fff7f4 0%, #f8fbff 52%, #fff5fb 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:not(:disabled):hover {
      transform: translateY(-2px);
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .hero {
      margin-bottom: 22px;
      text-align: center;
    }

    .hero__tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      margin-bottom: 12px;
      color: #a65169;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 140, 170, 0.24);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 1.05;
      letter-spacing: -0.06em;
    }

    .hero p {
      max-width: 660px;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: clamp(0.96rem, 2vw, 1.08rem);
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 420px;
      gap: 26px;
      align-items: stretch;
    }

    .card {
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius-xl);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .wheel-card {
      display: grid;
      min-height: 640px;
      place-items: center;
      padding: clamp(22px, 4vw, 42px);
    }

    .wheel-shell {
      position: relative;
      width: min(100%, 560px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .wheel-glow {
      position: absolute;
      inset: 6%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.86), rgba(255, 210, 223, 0.18) 58%, transparent 70%);
      filter: blur(16px);
      pointer-events: none;
    }

    #wheelCanvas {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      filter: drop-shadow(0 26px 44px rgba(123, 73, 103, 0.22));
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .pointer {
      position: absolute;
      z-index: 4;
      top: -13px;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 58px solid #ff486f;
      filter: drop-shadow(0 8px 10px rgba(178, 47, 78, 0.28));
    }

    .pointer::after {
      content: "";
      position: absolute;
      top: -52px;
      left: -11px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: inset 0 0 0 6px #ff8aa6;
    }

    .hint {
      position: absolute;
      z-index: 5;
      right: 7%;
      bottom: 7%;
      padding: 10px 14px;
      color: #8d6474;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
    }

    .panel {
      display: flex;
      min-height: 640px;
      flex-direction: column;
      padding: 28px;
    }

    .panel__head {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .panel h2 {
      margin: 0 0 7px;
      font-size: 1.55rem;
      letter-spacing: -0.04em;
    }

    .panel__head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .counter {
      flex: 0 0 auto;
      min-width: 68px;
      padding: 10px 12px;
      color: #fff;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 18px;
      box-shadow: 0 12px 24px rgba(137, 105, 255, 0.22);
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    .option-input {
      width: 100%;
      min-width: 0;
      padding: 15px 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .option-input:focus {
      border-color: rgba(255, 111, 145, 0.65);
      box-shadow: 0 0 0 4px rgba(255, 111, 145, 0.13);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 18px;
      color: #fff;
      font-weight: 800;
      border-radius: 16px;
      box-shadow: 0 13px 25px rgba(255, 111, 145, 0.25);
    }

    .btn--primary {
      background: linear-gradient(135deg, #ff7b9b, #ff4f7a);
    }

    .btn--secondary {
      background: linear-gradient(135deg, #8d84ff, #6d9cff);
      box-shadow: 0 13px 25px rgba(124, 115, 255, 0.23);
    }

    .btn--ghost {
      color: #8d6172;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 134, 164, 0.28);
      box-shadow: var(--shadow-soft);
    }

    .btn--danger {
      background: linear-gradient(135deg, #ff8b8b, #ff5d5d);
      box-shadow: 0 13px 25px rgba(255, 93, 93, 0.18);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .options-list {
      flex: 1;
      min-height: 240px;
      max-height: 390px;
      padding: 4px 2px 4px 0;
      margin: 0;
      overflow-y: auto;
      list-style: none;
    }

    .options-list::-webkit-scrollbar {
      width: 8px;
    }

    .options-list::-webkit-scrollbar-thumb {
      background: rgba(255, 111, 145, 0.34);
      border-radius: 999px;
    }

    .option-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(91, 62, 84, 0.07);
    }

    .swatch {
      width: 18px;
      height: 38px;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.54);
    }

    .option-edit {
      min-width: 0;
      width: 100%;
      padding: 10px 12px;
      color: var(--text);
      font-weight: 800;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid transparent;
      border-radius: 13px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .option-edit:hover:not(:disabled),
    .option-edit:focus {
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(255, 111, 145, 0.42);
      box-shadow: 0 0 0 4px rgba(255, 111, 145, 0.1);
    }

    .delete-btn {
      width: 38px;
      height: 38px;
      color: #ff5276;
      font-size: 1.1rem;
      font-weight: 900;
      background: #fff1f5;
      border-radius: 13px;
      box-shadow: none;
    }

    .empty-state {
      display: grid;
      min-height: 220px;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed rgba(255, 111, 145, 0.38);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.44);
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      color: #765a67;
      line-height: 1.55;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 18px;
    }

    .toast {
      position: fixed;
      z-index: 20;
      top: 22px;
      left: 50%;
      max-width: min(92vw, 420px);
      padding: 12px 16px;
      color: #fff;
      font-weight: 800;
      background: rgba(47, 42, 53, 0.88);
      border-radius: 999px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -18px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .modal {
      position: fixed;
      z-index: 30;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(43, 34, 47, 0.34);
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(8px);
      transition: opacity 0.24s ease;
    }

    .modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal__card {
      width: min(92vw, 460px);
      padding: 34px 30px 30px;
      text-align: center;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 217, 232, 0.9), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(202, 228, 255, 0.82), transparent 36%),
        #fff;
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 30px;
      box-shadow: 0 30px 90px rgba(35, 24, 40, 0.24);
      transform: scale(0.88) translateY(18px);
      transition: transform 0.34s cubic-bezier(0.18, 1.2, 0.28, 1);
    }

    .modal.show .modal__card {
      transform: scale(1) translateY(0);
    }

    .modal__spark {
      width: 74px;
      height: 74px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 2rem;
      background: linear-gradient(135deg, #ff7b9b, #8d84ff);
      border-radius: 50%;
      box-shadow: 0 16px 30px rgba(255, 111, 145, 0.28);
    }

    .modal h3 {
      margin: 0;
      color: #8a5266;
      font-size: 1.02rem;
      letter-spacing: 0.14em;
    }

    .result-text {
      margin: 12px 0 14px;
      font-size: clamp(2.2rem, 9vw, 4rem);
      font-weight: 950;
      line-height: 1.1;
      letter-spacing: -0.06em;
      background: linear-gradient(135deg, #ff4f7a, #7c73ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      word-break: break-word;
    }

    .modal p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .wheel-card,
      .panel {
        min-height: auto;
      }

      .panel {
        padding: 22px;
      }

      .options-list {
        max-height: 360px;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding: 22px 0;
      }

      .hero {
        text-align: left;
      }

      .hero__tag {
        margin-bottom: 10px;
      }

      .wheel-card {
        padding: 18px 12px 24px;
        border-radius: 24px;
      }

      .pointer {
        top: -9px;
        border-left-width: 17px;
        border-right-width: 17px;
        border-top-width: 46px;
      }

      .hint {
        right: 50%;
        bottom: -8px;
        transform: translateX(50%);
        white-space: nowrap;
      }

      .panel__head {
        align-items: center;
      }

      .add-row,
      .quick-actions {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="pageTitle">
      <div class="hero__tag">选择困难症急救站</div>
      <h1 id="pageTitle">今天听转盘的</h1>
      <p>把想吃的、想玩的、想看的都交给命运。点击转盘中央 START，给纠结一个漂亮的答案。</p>
    </section>

    <section class="layout">
      <div class="card wheel-card">
        <div class="wheel-shell">
          <div class="wheel-glow"></div>
          <div class="pointer" aria-hidden="true"></div>
          <canvas id="wheelCanvas" width="720" height="720" aria-label="决策转盘"></canvas>
          <div class="hint">点中心开始</div>
        </div>
      </div>

      <aside class="card panel" aria-label="选项管理面板">
        <div class="panel__head">
          <div>
            <h2>选项管理</h2>
            <p>添加、编辑或删除候选项，刷新页面后也会自动保留。</p>
          </div>
          <div class="counter"><span id="optionCount">0</span> 项</div>
        </div>

        <form class="add-row" id="addForm">
          <input class="option-input" id="optionInput" type="text" maxlength="16" autocomplete="off" placeholder="例如：日料、看电影、散步">
          <button class="btn btn--primary" id="addBtn" type="submit">添加</button>
        </form>

        <div class="quick-actions">
          <button class="btn btn--ghost" id="resetBtn" type="button">恢复美食模板</button>
          <button class="btn btn--danger" id="clearBtn" type="button">清空全部</button>
        </div>

        <ul class="options-list" id="optionsList"></ul>

        <div class="status" id="statusText">准备好了，点击转盘中心开始。</div>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="modal" id="resultModal" aria-hidden="true">
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <div class="modal__spark">♡</div>
      <h3 id="resultTitle">命运选择了</h3>
      <div class="result-text" id="resultText"></div>
      <p>别犹豫啦，今天就交给这个答案。点击任意位置关闭。</p>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "coupleDecisionWheelOptions";
      var DEFAULT_OPTIONS = ["火锅", "萨莉亚", "烧烤", "麦当劳", "湘菜", "日料", "奶茶", "小龙虾"];
      var COLORS = [
        "#FFB3C7", "#AEE6E6", "#FFD6A5", "#BDB2FF",
        "#FDFFB6", "#CAFFBF", "#9BF6FF", "#FFC6FF",
        "#FFADAD", "#B8E0D2", "#F7C8E0", "#CDE7BE"
      ];

      var canvas = document.getElementById("wheelCanvas");
      var ctx = canvas.getContext("2d");
      var addForm = document.getElementById("addForm");
      var optionInput = document.getElementById("optionInput");
      var addBtn = document.getElementById("addBtn");
      var resetBtn = document.getElementById("resetBtn");
      var clearBtn = document.getElementById("clearBtn");
      var optionsList = document.getElementById("optionsList");
      var optionCount = document.getElementById("optionCount");
      var statusText = document.getElementById("statusText");
      var toast = document.getElementById("toast");
      var modal = document.getElementById("resultModal");
      var resultText = document.getElementById("resultText");

      var options = loadOptions();
      var rotation = -Math.PI / 2;
      var isSpinning = false;
      var toastTimer = null;

      function loadOptions() {
        try {
          var saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (Array.isArray(saved)) {
            return saved.filter(function (item) {
              return typeof item === "string" && item.trim();
            }).map(function (item) {
              return item.trim();
            });
          }
        } catch (error) {
          localStorage.removeItem(STORAGE_KEY);
        }
        return DEFAULT_OPTIONS.slice();
      }

      function saveOptions() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(options));
      }

      function normalizeAngle(angle) {
        var full = Math.PI * 2;
        return ((angle % full) + full) % full;
      }

      function getSelectedIndex() {
        if (!options.length) return -1;
        var arc = Math.PI * 2 / options.length;
        var pointerAngle = -Math.PI / 2;
        var relativeAngle = normalizeAngle(pointerAngle - rotation);
        return Math.floor(relativeAngle / arc) % options.length;
      }

      function drawWheel() {
        var width = canvas.width;
        var height = canvas.height;
        var centerX = width / 2;
        var centerY = height / 2;
        var radius = Math.min(width, height) * 0.44;
        var innerRadius = radius * 0.22;

        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.translate(centerX, centerY);

        ctx.beginPath();
        ctx.arc(0, 0, radius + 18, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.72)";
        ctx.fill();

        if (!options.length) {
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.fillStyle = "#fff";
          ctx.fill();
          ctx.fillStyle = "#9a8d9d";
          ctx.font = "700 34px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("先添加选项", 0, -8);
          ctx.font = "500 21px sans-serif";
          ctx.fillText("让转盘重新热闹起来", 0, 34);
          drawCenterButton(centerX, centerY, innerRadius, true);
          ctx.restore();
          return;
        }

        var arc = Math.PI * 2 / options.length;
        for (var i = 0; i < options.length; i++) {
          var start = rotation + i * arc;
          var end = start + arc;
          var color = COLORS[i % COLORS.length];

          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, radius, start, end);
          ctx.closePath();
          ctx.fillStyle = color;
          ctx.fill();
          ctx.lineWidth = 4;
          ctx.strokeStyle = "rgba(255,255,255,0.78)";
          ctx.stroke();

          ctx.save();
          ctx.rotate(start + arc / 2);
          ctx.fillStyle = "#3d3543";
          ctx.font = getFontSize(options.length) + "px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowColor = "rgba(255,255,255,0.55)";
          ctx.shadowBlur = 8;
          ctx.fillText(trimText(options[i], options.length), radius * 0.58, 0);
          ctx.restore();
        }

        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.lineWidth = 9;
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.stroke();

        drawCenterButton(centerX, centerY, innerRadius, isSpinning || options.length < 2);
        ctx.restore();
      }

      function drawCenterButton(centerX, centerY, radius, disabled) {
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.translate(centerX, centerY);

        var gradient = ctx.createLinearGradient(-radius, -radius, radius, radius);
        if (disabled) {
          gradient.addColorStop(0, "#d5cfd9");
          gradient.addColorStop(1, "#a99faf");
        } else {
          gradient.addColorStop(0, "#ff7b9b");
          gradient.addColorStop(1, "#7c73ff");
        }

        ctx.beginPath();
        ctx.arc(0, 0, radius * 1.35, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(0, 0, radius * 1.12, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.shadowColor = "rgba(96,74,120,0.28)";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetY = 8;
        ctx.fill();

        ctx.shadowColor = "transparent";
        ctx.fillStyle = "#fff";
        ctx.font = "900 " + Math.max(22, radius * 0.32) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("START", 0, 2);
        ctx.restore();
      }

      function getFontSize(count) {
        if (count <= 6) return 29;
        if (count <= 10) return 24;
        return 20;
      }

      function trimText(text, count) {
        var maxLength = count > 10 ? 5 : 7;
        return text.length > maxLength ? text.slice(0, maxLength) + "…" : text;
      }

      function renderOptions() {
        optionCount.textContent = options.length;
        optionsList.innerHTML = "";

        if (!options.length) {
          var empty = document.createElement("li");
          empty.className = "empty-state";
          empty.textContent = "当前没有选项，添加两个以上选项后就能开始转啦。";
          optionsList.appendChild(empty);
        } else {
          options.forEach(function (item, index) {
            var li = document.createElement("li");
            li.className = "option-item";

            var swatch = document.createElement("span");
            swatch.className = "swatch";
            swatch.style.background = COLORS[index % COLORS.length];

            var name = document.createElement("input");
            name.className = "option-edit";
            name.type = "text";
            name.maxLength = 16;
            name.value = item;
            name.title = "点击编辑：" + item;
            name.disabled = isSpinning;
            name.setAttribute("aria-label", "编辑选项 " + item);
            name.addEventListener("keydown", function (event) {
              if (event.key === "Enter") {
                event.preventDefault();
                event.currentTarget.blur();
              }

              if (event.key === "Escape") {
                event.preventDefault();
                event.currentTarget.value = item;
                event.currentTarget.blur();
              }
            });
            name.addEventListener("blur", function (event) {
              updateOption(index, event.currentTarget.value, item);
            });

            var del = document.createElement("button");
            del.className = "delete-btn";
            del.type = "button";
            del.textContent = "×";
            del.setAttribute("aria-label", "删除 " + item);
            del.disabled = isSpinning;
            del.addEventListener("click", function () {
              if (isSpinning) return;
              options.splice(index, 1);
              saveOptions();
              render();
            });

            li.appendChild(swatch);
            li.appendChild(name);
            li.appendChild(del);
            optionsList.appendChild(li);
          });
        }

        updateControls();
      }

      function updateControls() {
        addBtn.disabled = isSpinning;
        resetBtn.disabled = isSpinning;
        clearBtn.disabled = isSpinning || options.length === 0;
        optionInput.disabled = isSpinning;
        canvas.style.cursor = isSpinning || options.length < 2 ? "not-allowed" : "pointer";

        if (isSpinning) {
          statusText.textContent = "转盘高速旋转中，请等待命运揭晓。";
        } else if (options.length < 2) {
          statusText.textContent = "至少需要 2 个选项才能开始旋转。";
        } else {
          statusText.textContent = "准备好了，点击转盘中心 START 开始。";
        }
      }

      function render() {
        renderOptions();
        drawWheel();
      }

      function addOption(value) {
        var text = value.trim();
        if (!text) {
          showToast("先写一个选项吧");
          return;
        }
        if (options.some(function (item) { return item === text; })) {
          showToast("这个选项已经在转盘里啦");
          return;
        }
        options.push(text);
        saveOptions();
        optionInput.value = "";
        render();
      }

      function updateOption(index, value, originalValue) {
        if (isSpinning) return;

        var text = value.trim();
        if (!text) {
          showToast("选项不能为空");
          renderOptions();
          return;
        }

        var duplicated = options.some(function (item, itemIndex) {
          return itemIndex !== index && item === text;
        });

        if (duplicated) {
          showToast("这个选项已经在转盘里啦");
          renderOptions();
          return;
        }

        if (text === originalValue) {
          renderOptions();
          return;
        }

        options[index] = text;
        saveOptions();
        render();
        showToast("选项已更新");
      }

      function startSpin() {
        if (isSpinning) return;
        if (options.length < 2) {
          showToast("至少添加 2 个选项才能开转");
          return;
        }

        isSpinning = true;
        renderOptions();

        var duration = 3500 + Math.random() * 500;
        var startTime = performance.now();
        var startRotation = rotation;
        var targetIndex = Math.floor(Math.random() * options.length);
        var arc = Math.PI * 2 / options.length;
        var pointerAngle = -Math.PI / 2;
        var targetRotation = pointerAngle - (targetIndex + 0.5) * arc;
        var extraTurns = 6 + Math.floor(Math.random() * 3);
        var finalRotation = targetRotation + extraTurns * Math.PI * 2;

        while (finalRotation <= startRotation) {
          finalRotation += Math.PI * 2;
        }

        var totalChange = finalRotation - startRotation;

        function animate(now) {
          var elapsed = now - startTime;
          var t = Math.min(elapsed / duration, 1);
          rotation = startRotation + totalChange * spinEase(t);
          drawWheel();

          if (t < 1) {
            requestAnimationFrame(animate);
            return;
          }

          rotation = normalizeAngle(finalRotation);
          isSpinning = false;
          var selectedIndex = getSelectedIndex();
          var result = options[selectedIndex] || options[targetIndex];
          render();
          showResult(result);
        }

        requestAnimationFrame(animate);
      }

      function spinEase(t) {
        var accelerateUntil = 0.16;
        var accelerateDistance = 0.13;

        if (t < accelerateUntil) {
          var p = t / accelerateUntil;
          return accelerateDistance * p * p * p;
        }

        var d = (t - accelerateUntil) / (1 - accelerateUntil);
        var easeOut = 1 - Math.pow(1 - d, 4);
        return accelerateDistance + (1 - accelerateDistance) * easeOut;
      }

      function showResult(result) {
        resultText.textContent = result;
        modal.classList.add("show");
        modal.setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        modal.classList.remove("show");
        modal.setAttribute("aria-hidden", "true");
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove("show");
        }, 1800);
      }

      function isCenterClick(event) {
        var rect = canvas.getBoundingClientRect();
        var x = event.clientX - rect.left;
        var y = event.clientY - rect.top;
        var dx = x - rect.width / 2;
        var dy = y - rect.height / 2;
        var startRadius = rect.width * 0.13;
        return Math.sqrt(dx * dx + dy * dy) <= startRadius;
      }

      addForm.addEventListener("submit", function (event) {
        event.preventDefault();
        if (!isSpinning) addOption(optionInput.value);
      });

      resetBtn.addEventListener("click", function () {
        if (isSpinning) return;
        options = DEFAULT_OPTIONS.slice();
        saveOptions();
        render();
        showToast("已恢复默认美食模板");
      });

      clearBtn.addEventListener("click", function () {
        if (isSpinning || !options.length) return;
        options = [];
        saveOptions();
        render();
        showToast("已经清空全部选项");
      });

      canvas.addEventListener("click", function (event) {
        if (isCenterClick(event)) {
          startSpin();
        }
      });

      modal.addEventListener("click", closeModal);

      window.addEventListener("resize", drawWheel);

      render();
    }());
  </script>
</body>
</html>
